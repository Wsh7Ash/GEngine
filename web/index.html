<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GameEngine - Web</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas.emscripten {
      border: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: monospace;
      font-size: 18px;
      text-align: center;
    }
    #loading .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #progress-bar {
      width: 200px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin: 12px auto 0;
      overflow: hidden;
    }
    #progress-fill {
      width: 0%;
      height: 100%;
      background: #4fc3f7;
      transition: width 0.2s;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading GameEngine...</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>

  <script>
    var Module = {
      canvas: document.getElementById('canvas'),
      onRuntimeInitialized: function() {
        document.getElementById('loading').style.display = 'none';
      },
      setStatus: function(text) {
        var fill = document.getElementById('progress-fill');
        var match = text.match(/([0-9]+)%/);
        if (match) {
          fill.style.width = match[1] + '%';
        }
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        var done = this.totalDependencies - left;
        var pct = this.totalDependencies ? Math.round(done / this.totalDependencies * 100) : 100;
        Module.setStatus(pct + '%');
      }
    };
  </script>
  <script async type="text/javascript" src="GameEngine.js"></script>
</body>
</html>
